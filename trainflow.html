const BarCh=({data,color="#3b82f6",h=64})=>{const max=Math.max(...data.map(d=>d.v),1),w=100/data.length;return(<svg width="100%" height={h} viewBox={`0 0 100 ${h}`} preserveAspectRatio="none">{data.map((d,i)=>{const bh=Math.max((d.v/max)*(h-4),d.v>0?2:0);return<rect key={i} x={i*w+.5} y={h-bh-2} width={Math.max(w-1,.5)} height={bh} fill={d.hi?color:color+"88"} rx="1.5"/>})}</svg>)};
const LineCh=({datasets,h=96,zero=false})=>{const all=datasets.flatMap(d=>d.data),mn=Math.min(...all),mx=Math.max(...all,mn+1),rng=mx-mn||1,n=datasets[0]?.data.length||1,pad=4,path=data=>data.map((v,i)=>{const x=n>1?(i/(n-1))*100:50,y=h-pad-((v-mn)/rng)*(h-pad*2);return`${i===0?"M":"L"} ${x.toFixed(1)} ${y.toFixed(1)}`}).join(" "),zy=h-pad-((0-mn)/rng)*(h-pad*2);return(<svg width="100%" height={h} viewBox={`0 0 100 ${h}`} preserveAspectRatio="none">{zero&&<line x1="0" y1={zy} x2="100" y2={zy} stroke="#e2e8f0" strokeWidth=".5" strokeDasharray="2,2"/>}{datasets.map((ds,i)=><path key={i} d={path(ds.data)} fill="none" stroke={ds.color} strokeWidth={ds.w||1.8} strokeLinecap="round" strokeLinejoin="round" opacity=".9"/>)}</svg>)};

const WktChart=({steps,thr=170,height=64})=>{const flat=[];const exp=ss=>ss.forEach(s=>{if(s.type==="repeat"){for(let i=0;i<s.repeatCount;i++)exp(s.steps);}else flat.push(s)});exp(steps);const tot=flat.reduce((a,s)=>a+(s.duration||0),0)||1;let cx=0;return(<svg width="100%" height={height} viewBox={`0 0 100 ${height}`} preserveAspectRatio="none">{flat.map((s,i)=>{const x=(cx/tot)*100,w=(s.duration/tot)*100;cx+=s.duration;let IF=0;if(s.targetType==="hr_bpm"&&s.targetLow&&s.targetHigh)IF=((s.targetLow+s.targetHigh)/2)/thr;else if(s.targetType==="hr_pct"&&s.targetLow&&s.targetHigh)IF=((s.targetLow+s.targetHigh)/2)/100;else IF=(STYPES[s.type]||{dIF:.72}).dIF;const bh=Math.max(Math.min(IF,1.3)*(height-8),4),y=height-bh-2;return<rect key={i} x={x} y={y} width={Math.max(w-.4,.3)} height={bh} fill={SCOLS[s.type]||"#94a3b8"} rx="1" opacity=".9"/>})}</svg>)};

const ActCard=({a,expanded,onToggle})=>{const sp=getSport(a.type);return(<div className="bg-white rounded-2xl overflow-hidden mb-3 shadow-sm" style={{border:"1px solid #f1f5f9"}}><div className="p-4 cursor-pointer" onClick={onToggle}><div className="flex items-start gap-3"><div className="w-11 h-11 rounded-xl flex items-center justify-center text-2xl flex-shrink-0" style={{background:sp.bg}}>{sp.emoji}</div><div className="flex-1 min-w-0"><p className="font-semibold text-gray-900 text-sm truncate">{a.name}</p><p className="text-xs text-gray-400 mt-0.5">{sp.label} · {fmtDate(a.start_date_local)}</p></div>{a.icu_training_load>0&&<span className="text-xs font-bold px-2 py-1 rounded-xl flex-shrink-0" style={{background:sp.bg,color:sp.color}}>{Math.round(a.icu_training_load)} TSS</span>}</div><div className="flex gap-5 mt-3 pl-1">{a.distance>0&&<div><p className="text-[11px] text-gray-400">Dist</p><p className="text-sm font-semibold">{fmtDist(a.distance)}</p></div>}<div><p className="text-[11px] text-gray-400">Time</p><p className="text-sm font-semibold">{fmtTime(a.moving_time)}</p></div>{a.average_heartrate>0&&<div><p className="text-[11px] text-gray-400">Avg HR</p><p className="text-sm font-semibold">❤️ {Math.round(a.average_heartrate)}</p></div>}{a.total_elevation_gain>0&&<div><p className="text-[11px] text-gray-400">Elev</p><p className="text-sm font-semibold">⬆ {Math.round(a.total_elevation_gain)}m</p></div>}</div></div>{expanded&&(<div className="border-t border-gray-50 bg-gray-50 px-4 pt-3 pb-4 space-y-2">{a.average_speed>0&&<div className="flex justify-between text-sm"><span className="text-gray-500">Pace/Speed</span><span className="font-semibold">{fmtSpeed(a.average_speed,a.type)}</span></div>}{a.max_heartrate>0&&<div className="flex justify-between text-sm"><span className="text-gray-500">Max HR</span><span className="font-semibold">❤️ {Math.round(a.max_heartrate)} bpm</span></div>}{a.average_watts>0&&<div className="flex justify-between text-sm"><span classNa const StepRow=({step,onChange,onRemove,child=false})=>{const cfg=STYPES[step.type]||{label:"Step",color:"#6b7280",bg:"#f9fafb"};return(<div className={`rounded-xl p-3 mb-2 ${child?"ml-4":""}`} style={{background:cfg.bg,border:`1px solid ${cfg.color}33`}}><div className="flex items-center gap-2 mb-2"><div className="w-2 h-2 rounded-full flex-shrink-0" style={{background:cfg.color}}/><select value={step.type} onChange={e=>onChange({...step,type:e.target.value})} className="text-xs font-bold bg-transparent outline-none flex-1" style={{color:cfg.color}}>{Object.entries(STYPES).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}</select><button onClick={onRemove} className="text-gray-400 text-sm ml-auto">✕</button></div><input className="w-full bg-white rounded-lg px-2 py-1.5 text-xs border border-gray-200 mb-2 outline-none" placeholder="Step name (optional)" value={step.name||""} onChange={e=>onChange({...step,name:e.target.value})}/><div className="grid grid-cols-2 gap-2 mb-2"><div><p className="text-[10px] text-gray-400 mb-1">Duration (MM:SS)</p><input className="w-full bg-white rounded-lg px-2 py-1.5 text-sm font-mono border border-gray-200 outline-none" placeholder="15:00" value={fmtSecs(step.duration)} onChange={e=>onChange({...step,duration:parseSecs(e.target.value)})}/></div><div><p className="text-[10px] text-gray-400 mb-1">Target</p><select value={step.targetType||"hr_bpm"} onChange={e=>onChange({...step,targetType:e.target.value})} className="w-full bg-white rounded-lg px-2 py-1.5 text-xs border border-gray-200 outline-none"><option value="hr_bpm">HR bpm</option><option value="hr_pct">HR % thr</option><option value="pace">Pace /km</option><option value="open">Open</option></select></div></div>{step.targetType!=="open"&&(<div className="flex items-center gap-2">{step.targetType==="pace"?(<><input className="flex-1 bg-white rounded-lg px-2 py-1.5 text-sm font-mono border border-gray-200 outline-none" placeholder="4:30" value={step.pacelow||""} onChange={ const HomeScreen=({activities,events,fitness,loading})=>{const tod=today(),hr=new Date().getHours(),gr=hr<12?"Good morning":hr<18?"Good afternoon":"Good evening",todAct=activities.find(a=>a.start_date_local?.startsWith(tod)),todEvt=events.find(e=>e.start_date_local?.startsWith(tod)),wS=(()=>{const d=new Date();d.setDate(d.getDate()-d.getDay());return toDS(d)})(),wA=activities.filter(a=>a.start_date_local>=wS&&a.start_date_local<=tod),wTSS=Math.round(wA.reduce((s,a)=>s+(a.icu_training_load||0),0)),wT=wA.reduce((s,a)=>s+(a.moving_time||0),0),wD=wA.reduce((s,a)=>s+(a.distance||0),0),last6=useMemo(()=>Array.from({length:6},(_,w)=>{const e=new Date();e.setDate(e.getDate()-w*7);const s=new Date(e);s.setDate(e.getDate()-7);const tss=activities.filter(a=>a.start_date_local>=toDS(s)&&a.start_date_local<toDS(e)).reduce((a,b)=>a+(b.icu_training_load||0),0);return{v:Math.round(tss),hi:w===0}}).reverse(),[activities]),lat=fitness[fitness.length-1];return(<div className="px-4 pt-6 pb-2 fade-in"><div className="flex items-start justify-between mb-5"><div><p className="text-gray-400 text-sm">{gr},</p><h1 className="text-2xl font-bold text-gray-900">Carlos 👋</h1></div><div className="text-right"><p className="text-xs text-gray-400 uppercase tracking-wide">{new Date().toLocaleDateString("en-US",{weekday:"long"})}</p><p className="text-sm font-semibold text-gray-500 mt-0.5">{new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"})}</p></div></div><p className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Today</p>{todAct?(<div className="rounded-2xl p-4 mb-4 flex items-start gap-3" style={{background:getSport(todAct.type).bg}}><span className="text-3xl">{getSport(todAct.type).emoji}</span><div className="flex-1"><div className="flex items-center gap-2"><p className="font-bold text-gray-900 text-sm">{todAct.name}</p><span className="ml-auto text-xs bg-green-100 text-green-700 px-2 py-0.5 rounded-full font-semibold">✓ Done</span></div><div className="flex   </div>)};

const AnalyticsScreen=({activities,fitness})=>{const [period,setPeriod]=useState(42),fit=fitness.slice(-period),lat=fitness[fitness.length-1]||{ctl:0,atl:0,tsb:0},wkLoad=useMemo(()=>Array.from({length:12},(_,w)=>{const e=new Date();e.setDate(e.getDate()-w*7);const s=new Date(e);s.setDate(e.getDate()-7);const tss=activities.filter(a=>a.start_date_local>=toDS(s)&&a.start_date_local<toDS(e)).reduce((a,b)=>a+(b.icu_training_load||0),0);return{v:Math.round(tss),hi:w===0}}).reverse(),[activities]),zoneTot=useMemo(()=>{const t=[0,0,0,0,0,0];activities.forEach(a=>{if(a.icu_zone_times)a.icu_zone_times.forEach((v,i)=>{t[i]=(t[i]||0)+v})});return t},[activities]),totZ=zoneTot.reduce((a,b)=>a+b,0)||1,spDist=useMemo(()=>{const m={};activities.forEach(a=>{const sp=getSport(a.type);m[sp.label]=(m[sp.label]||{label:sp.label,emoji:sp.emoji,color:sp.color,v:0});m[sp.label].v+=a.moving_time||0});return Object.values(m).sort((a,b)=>b.v-a.v)},[activities]),totSp=spDist.reduce((a,b)=>a+b.v,0)||1;return(<div className="px-4 pt-6 pb-4 fade-in"><div className="flex items-center justify-between mb-4"><h1 className="text-2xl font-bold text-gray-900">Analytics</h1><div className="flex gap-1 bg-gray-100 p-0.5 rounded-xl">{[{l:"6W",v:42},{l:"3M",v:90},{l:"6M",v:180}].map(p=><button key={p.v} onClick={()=>setPeriod(p.v)} className={`px-3 py-1 rounded-xl text-sm font-bold transition-all ${period===p.v?"bg-white text-gray-900 shadow-sm":"text-gray-400"}`}>{p.l}</button>)}</div></div><div className="bg-white rounded-2xl p-4 mb-4 shadow-sm border border-gray-50"><div className="flex gap-4 mb-3">{[{l:"Fitness (CTL)",v:lat.ctl,c:"#3b82f6"},{l:"Fatigue (ATL)",v:lat.atl,c:"#ef4444"},{l:"Form (TSB)",v:lat.tsb,c:lat.tsb>=0?"#10b981":"#f97316"}].map(({l,v,c})=><div key={l}><p className="text-lg font-bold" style={{color:c}}>{v>0?"+":""}{v}</p><p className="text-[10px] text-gray-400">{l}</p></div>)}</div><div className="h-24"><LineCh h={96} zero datasets={[{color:"#3b82f6",data:fit.map(d=>d.ctl)},{color:"#ef4444",data:fit.map(d=>d.atl)},{color:"#10b981",w:1.4,data:fit.map(d=>d.tsb)}]}/></div><div className="flex gap-4 mt-2">{[["#3b82f6","Fitness"],["#ef4444","Fatigue"],["#10b981","Form"]].map(([c,l])=><span key={l} className="flex items-center gap-1 text-[11px] text-gray-500"><span className="w-3 h-1.5 rounded-full inline-block" style={{background:c}}/>{l}</span>)}</div></div><div className="bg-white rounded-2xl p-4 mb-4 shadow-sm border border-gray-50"><p className="text-sm font-bold text-gray-700 mb-3">Weekly Load (TSS)</p><div className="h-20"><BarCh data={wkLoad} color="#3b82f6" h={80}/></div><div className="flex justify-between text-[10px] text-gray-400 mt-1"><span>12w ago</span><span>Now</span></div></div>{totZ>0&&<div className="bg-white rounded-2xl p-4 mb-4 shadow-sm border border-gray-50"><p className="text-sm font-bold text-gray-700 mb-3">HR Zone Distribution</p><div className="flex h-5 rounded-xl overflow-hidden gap-0.5 mb-3">{zoneTot.map((t,i)=>t>0&&<div key={i} style={{width:`${(t/totZ)*100}%`,background:ZC[i]}}/>)}</div><div className="space-y-1.5">{zoneTot.map((t,i)=>t>0&&<div key={i} className="flex items-center gap-2"><div className="w-2.5 h-2.5 rounded-full flex-shrink-0" style={{background:ZC[i]}}/><span className="text-xs text-gray-500 flex-1">{ZL[i]} — {ZN[i]}</span><span className="text-xs font-bold text-gray-700">{fmtTime(t)}</span><span className="text-xs text-gray-400 w-8 text-right">{Math.round(t/totZ*100)}%</span></div>)}</div></div>}{spDist.length>0&&<div className="bg-white rounded-2xl p-4 mb-4 shadow-sm border border-gray-50"><p className="text-sm font-bold text-gray-700 mb-3">Sport Mix</p><div className="space-y-2.5">{spDist.map(s=><div key={s.label} className="flex items-center gap-2"><span className="text-base w-6 flex-shrink-0">{s.emoji}</span><span className="text-xs text-gray-600 w-20 flex-shrink-0">{s.label}</span><div className="flex-1 bg-gray-100 rounded-full h-2"><div className="h-2 rounded-full" style={{width:`${(s.v/totSp)*100}%`,background:s.color}}/></div><span className="text-xs text-gray-400 w-10 text-right">{fmtTime(s.v)}</span></div>)}</div></div>}</div>)};

const SettingsScreen=({apiStatus,reload})=>(<div className="px-4 pt-6 fade-in"><h1 className="text-2xl font-bold text-gray-900 mb-5">Settings</h1><div className={`rounded-2xl p-4 mb-4 flex items-start gap-3 ${apiStatus==="connected"?"bg-green-50 border border-green-100":apiStatus==="error"?"bg-amber-50 border border-amber-100":"bg-gray-50"}`}><span className="text-2xl mt-0.5">{apiStatus==="connected"?"✅":apiStatus==="error"?"⚠️":"⏳"}</span><div><p className="font-bold text-gray-900 text-sm">Intervals.icu</p><p className="text-xs text-gray-600 mt-0.5">{apiStatus==="connected"?"Connected · Live data syncing":apiStatus==="error"?"CORS blocked — using demo data. Run via local server for live data.":"Connecting..."}</p><button onClick={reload} className="text-xs text-blue-600 font-semibold mt-1">↺ Retry</button></div></div><div className="bg-white rounded-2xl p-4 mb-4 shadow-sm border border-gray-50"><p className="text-xs font-bold text-gray-400 uppercase mb-3">Account</p><div className="space-y-3"><div className="flex items-center justify-between"><span className="text-sm text-gray-600">Athlete ID</span><span className="text-sm font-mono bg-gray-100 px-2.5 py-1 rounded-xl text-gray-700">{ATHLETE_ID}</span></div><div className="flex items-center justify-between"><span className="text-sm text-gray-600">API Key</span><span className="text-sm font-mono bg-gray-100 px-2.5 py-1 rounded-xl text-gray-700">••••••{API_KEY.slice(-4)}</span></div></div></div><div className="bg-white rounded-2xl p-4 mb-4 shadow-sm border border-gray-50"><p className="text-xs font-bold text-gray-400 uppercase mb-3">Garmin Sync</p><div className="bg-blue-50 rounded-xl p-3"><p className="text-sm font-bold text-blue-800 mb-1">🔄 How it works</p><p className="text-xs text-blue-700 leading-relaxed">Workouts planned here are saved as Intervals.icu events. Intervals.icu auto-pushes them to <strong>Garmin Connect</strong> nightly. Enable at intervals.icu → Settings → Garmin → "Upload planned workouts".</p></div></div><div className="bg-gray-50 rounded-2xl p-4 mb-4 border border-gray-100"><p className="text-xs font-bold text-gray-600 mb-2">💡 Live Data (fix CORS)</p><div className="bg-gray-900 rounded-xl p-3 text-xs font-mono text-green-400 overflow-x-auto"><div className="text-gray-500"># Node</div><div>npx serve .</div><div className="text-gray-500 mt-1"># Python</div><div>python3 -m http.server 8080</div></div><p className="text-xs text-gray-400 mt-2">Open http://localhost:PORT/trainflow.html</p></div><div className="text-center text-xs text-gray-300 py-4">TrainFlow v2.0 · Personal Training Platform<br/>Built for Carlos · Powered by Intervals.icu</div></div>);

const TABS=[{id:"home",emoji:"🏠",label:"Home"},{id:"activities",emoji:"⚡",label:"Activities"},{id:"plan",emoji:"📅",label:"Plan"},{id:"analytics",emoji:"📊",label:"Analytics"},{id:"settings",emoji:"⚙️",label:"Settings"}];
const TAB_IDS=new Set(TABS.map(t=>t.id));
const SCREEN_TITLES={home:"Home",activities:"Activities",plan:"Plan",analytics:"Analytics",settings:"Settings",library:"Workout Library",builder:"Workout Builder",wkt_detail:"Workout Detail"};

const App=()=>{
  const [stack,setStack]=useState([{screen:"home"}]);
  const cur=stack[stack.length-1],canBack=stack.length>1;
  const push=e=>setStack(s=>[...s,e]),goBack=()=>setStack(s=>s.length>1?s.slice(0,-1):s),goTab=id=>setStack([{screen:id}]);
  const activeTab=TAB_IDS.has(cur.screen)?cur.screen:(stack.slice().reverse().find(s=>TAB_IDS.has(s.screen))?.screen||"home");
  const [activities,setActivities]=useState([]),[events,setEvents]=useState([]),[fitness,setFitness]=useState([]),[syncWarn,setSyncWarn]=useState(false),[loading,setLoading]=useState(true),[apiStatus,setApiStatus]=useState("loading");
  const LIB_VER="v2-fit15";const [library,setLibrary]=useState(()=>{try{const s=localStorage.getItem("tf_lib");const v=localStorage.getItem("tf_lib_ver");if(s&&v===LIB_VER)return JSON.parse(s);localStorage.removeItem("tf_lib");localStorage.setItem("tf_lib_ver",LIB_VER);return DEFAULT_LIB}catch{return DEFAULT_LIB}});
  const [blocks,setBlocksRaw]=useState(()=>{try{return JSON.parse(localStorage.getItem("tf_blocks")||"[]")}catch{return[]}});
  const setBlocks=b=>{setBlocksRaw(b);try{localStorage.setItem("tf_blocks",JSON.stringify(b))}catch{}};
  const saveToLib=w=>{setLibrary(l=>{const next=l.find(x=>x.id===w.id)?l.map(x=>x.id===w.id?w:x):[...l,w];try{localStorage.setItem("tf_lib",JSON.stringify(next));localStorage.setItem("tf_lib_ver",LIB_VER)}catch{};return next})};
  const loadData=useCallback(async()=>{setLoading(true);setApiStatus("loading");try{const[acts,evts]=await Promise.all([api.get("/activities",{oldest:dAgo(90),newest:today()}),api.get("/events",{oldest:dAgo(7),newest:dAhead(60)})]);setActivities(Array.isArray(acts)?acts:[]);setEvents(Array.isArray(evts)?evts:[]);setApiStatus("connected");try{const w=await api.get("/wellness",{oldest:dAgo(90),newest:today()});if(Array.isArray(w)&&w.length>0){const ft=w.filter(x=>x.ctl!=null).map(x=>({date:x.id,ctl:Math.round(x.ctl||0),atl:Math.round(x.atl||0),tsb:Math.round(x.tsb||0)}));if(ft.length>0){setFitness(ft)}else setFitness(makeFit())}else setFitness(makeFit())}catch{setFitness(makeFit())}}catch(e){console.warn("API unavailable:",e.message);setActivities(makeDemo());setEvents([]);setFitness(makeFit());setApiStatus("error")}setLoading(false)},[]);
  useEffect(()=>{loadData()},[]);
  const addEvent=async payload=>{const result=await api.post("/events",payload);setEvents(prev=>[...prev,result].sort((a,b)=>a.start_date_local.localeCompare(b.start_date_local)));return result};
  const useWorkout=async(workout,targetDate)=>{const tss=calcTSS(workout.steps,workout.thresholdHR||170),dur=totalDur(workout.steps),payload={start_date_local:targetDate,category:"WORKOUT",type:workout.sport,name:workout.name,description:workout.description||"",moving_time:dur||undefined,icu_training_load:tss||undefined};try{const r=await addEvent(payload);console.log("✅ Synced to intervals.icu",r?.id)}catch(e){console.warn("⚠️ Sync failed:",e.message);setEvents(prev=>[...prev,{...payload,id:"local-"+uid(),start_date_local:targetDate+"T00:00:00"}]);setSyncWarn(true)}};
  return(
    <div className="shell">
      {syncWarn&&<div className="fixed top-0 left-0 right-0 z-50 max-w-[430px] mx-auto bg-amber-500 text-white text-xs px-4 py-2.5 flex items-center gap-2 shadow-lg"><span>⚠️</span><span className="flex-1 font-medium">Saved locally only · Open via local server to sync with intervals.icu</span><button onClick={()=>setSyncWarn(false)} className="font-bold text-xl leading-none opacity-80">×</button></div>}
      {canBack&&<div className="flex items-center gap-2 px-4 py-3 bg-white border-b border-gray-100 flex-shrink-0" style={{zIndex:50}}><button onClick={goBack} className="flex items-center gap-1.5 text-blue-600 font-semibold text-sm"><span className="text-xl leading-none">‹</span>Back</button><h2 className="text-base font-bold text-gray-900 flex-1 text-center pr-14">{SCREEN_TITLES[cur.screen]||""}</h2></div>}
      <div className="content">
        {cur.screen==="home"&&<HomeScreen activities={activities} events={events} fitness={fitness} loading={loading}/>}
        {cur.screen==="activities"&&<ActivitiesScreen activities={activities} loading={loading}/>}
        {cur.screen==="plan"&&<PlanScreen activities={activities} events={events} push={push} blocks={blocks} setBlocks={setBlocks} onAddEvent={addEvent}/>}
        {cur.screen==="analytics"&&<AnalyticsScreen activities={activities} fitness={fitness}/>}
        {cur.screen==="settings"&&<SettingsScreen apiStatus={apiStatus} reload={loadData}/>}
        {cur.screen==="library"&&<WktLibraryScreen library={library} targetDate={cur.targetDate} push={push} goBack={goBack}/>}
        {cur.screen==="builder"&&<WktBuilderScreen onSave={saveToLib} goBack={goBack} targetDate={cur.targetDate} editWkt={cur.editWkt}/>}
        {cur.screen==="wkt_detail"&&<WktDetailScreen workout={cur.workout} targetDate={cur.targetDate} onUse={useWorkout} goBack={goBack}/>}
      </div>
      <nav className="bot-nav"><div className="flex">{TABS.map(t=><button key={t.id} onClick={()=>goTab(t.id)} className={`flex-1 flex flex-col items-center justify-center py-2 gap-0.5 ${activeTab===t.id?"text-blue-600":"text-gray-400"}`}><span className="text-[22px] leading-none">{t.emoji}</span><span className={`text-[10px] font-bold ${activeTab===t.id?"text-blue-600":"text-gray-400"}`}>{t.label}</span></button>)}</div></nav>
    </div>
  )
};
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script></body></html>
